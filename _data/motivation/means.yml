# ─────────────────────────────────────────────────────────────────────────────
# POLICIES (Internal Operational Policies)
# ─────────────────────────────────────────────────────────────────────────────

policies:

  - id: policy-open-access
    name: "Open Access Knowledge"
    description: "All core research and frameworks freely available"
    derived_from: "Value: Pragmatic Idealism"
    scope: "All content production"
    statement: "Primary frameworks, research, and educational content remain free. Premium access covers community features and direct support, not core knowledge."
    
  - id: policy-nonpartisan
    name: "Cross-Partisan Engagement"
    description: "Engage across political spectrum without partisan alignment"
    derived_from: "Value: Broad Coalition"
    scope: "All political engagement"
    statement: "Post-Labor Economics challenges laborism on both left and right. We engage anyone who accepts the premise that automation will displace labor."
    
  - id: policy-evidence
    name: "Evidence-Based Advocacy"
    description: "Ground all claims in empirical research and proven models"
    derived_from: "Value: Intellectual Honesty"
    scope: "All public claims"
    statement: "We cite existing programs (Norway, Alaska, India) and peer-reviewed research. We distinguish between proven mechanisms and theoretical proposals."

