<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
  </defs>
  
  <!-- L/0 Symbol -->
  <g transform="translate(5, 5)">
    <!-- L -->
    <path d="M0 0 L0 30 L12 30 L12 26 L4 26 L4 0 Z" fill="url(#logoGradient)"/>
    <!-- / -->
    <path d="M16 30 L26 0 L22 0 L12 30 Z" fill="url(#logoGradient)"/>
    <!-- 0 -->
    <circle cx="36" cy="15" r="12" fill="none" stroke="url(#logoGradient)" stroke-width="4"/>
  </g>
  
  <!-- Text: Post-Labor Economics -->
  <text x="60" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">
    Post-Labor
  </text>
  <text x="60" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#94a3b8">
    Economics
  </text>
</svg>
