<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="horizon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B4D3E"/>
      <stop offset="100%" style="stop-color:#2D6A54"/>
    </linearGradient>
    <linearGradient id="dawn-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4A261"/>
      <stop offset="100%" style="stop-color:#E08C3D"/>
    </linearGradient>
  </defs>
  
  <!-- Background square with rounded corners -->
  <rect x="4" y="4" width="56" height="56" rx="12" ry="12" fill="url(#horizon-gradient)"/>
  
  <!-- Dawn accent triangle -->
  <path d="M60 4 L60 60 L30 4 Z" fill="url(#dawn-gradient)" opacity="0.85" clip-path="inset(0 0 0 0 round 12px)"/>
  
  <!-- L/0 text -->
  <text x="32" y="42" 
        font-family="Georgia, serif" 
        font-size="22" 
        font-weight="700" 
        fill="white" 
        text-anchor="middle"
        letter-spacing="-1">L/0</text>
</svg>
