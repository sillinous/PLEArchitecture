<div class="motivation-diagram">
  <svg viewBox="0 0 400 300" class="diagram-svg">
    <!-- Background layers -->
    <defs>
      <linearGradient id="grad-ends" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3" />
        <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.1" />
      </linearGradient>
      <linearGradient id="grad-means" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3" />
        <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.1" />
      </linearGradient>
      <linearGradient id="grad-influence" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.3" />
        <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.1" />
      </linearGradient>
    </defs>
    
    <!-- ENDS Layer -->
    <g class="layer layer-ends" transform="translate(50, 20)">
      <rect x="0" y="0" width="300" height="70" rx="8" fill="url(#grad-ends)" stroke="#8b5cf6" stroke-width="2"/>
      <text x="150" y="20" text-anchor="middle" class="layer-label" fill="#a78bfa">ENDS</text>
      
      <g transform="translate(20, 30)">
        <rect x="0" y="0" width="75" height="30" rx="4" fill="#1e293b" stroke="#8b5cf6"/>
        <text x="37.5" y="20" text-anchor="middle" class="box-text" fill="#e2e8f0">Vision</text>
      </g>
      
      <g transform="translate(110, 30)">
        <rect x="0" y="0" width="75" height="30" rx="4" fill="#1e293b" stroke="#8b5cf6"/>
        <text x="37.5" y="20" text-anchor="middle" class="box-text" fill="#e2e8f0">Goals</text>
      </g>
      
      <g transform="translate(200, 30)">
        <rect x="0" y="0" width="80" height="30" rx="4" fill="#1e293b" stroke="#8b5cf6"/>
        <text x="40" y="20" text-anchor="middle" class="box-text" fill="#e2e8f0">Objectives</text>
      </g>
    </g>
    
    <!-- Arrow -->
    <g transform="translate(200, 95)">
      <line x1="0" y1="0" x2="0" y2="25" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
      <text x="60" y="15" class="arrow-label" fill="#94a3b8">Realized By</text>
    </g>
    
    <!-- MEANS Layer -->
    <g class="layer layer-means" transform="translate(50, 125)">
      <rect x="0" y="0" width="300" height="70" rx="8" fill="url(#grad-means)" stroke="#3b82f6" stroke-width="2"/>
      <text x="150" y="20" text-anchor="middle" class="layer-label" fill="#60a5fa">MEANS</text>
      
      <g transform="translate(20, 30)">
        <rect x="0" y="0" width="75" height="30" rx="4" fill="#1e293b" stroke="#3b82f6"/>
        <text x="37.5" y="20" text-anchor="middle" class="box-text" fill="#e2e8f0">Mission</text>
      </g>
      
      <g transform="translate(110, 30)">
        <rect x="0" y="0" width="80" height="30" rx="4" fill="#1e293b" stroke="#3b82f6"/>
        <text x="40" y="20" text-anchor="middle" class="box-text" fill="#e2e8f0">Strategies</text>
      </g>
      
      <g transform="translate(205, 30)">
        <rect x="0" y="0" width="75" height="30" rx="4" fill="#1e293b" stroke="#3b82f6"/>
        <text x="37.5" y="20" text-anchor="middle" class="box-text" fill="#e2e8f0">Tactics</text>
      </g>
    </g>
    
    <!-- Arrow -->
    <g transform="translate(200, 200)">
      <line x1="0" y1="0" x2="0" y2="25" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
      <text x="70" y="15" class="arrow-label" fill="#94a3b8">Influenced By</text>
    </g>
    
    <!-- INFLUENCERS Layer -->
    <g class="layer layer-influence" transform="translate(50, 230)">
      <rect x="0" y="0" width="300" height="55" rx="8" fill="url(#grad-influence)" stroke="#10b981" stroke-width="2"/>
      <text x="150" y="18" text-anchor="middle" class="layer-label" fill="#34d399">INFLUENCERS</text>
      
      <g transform="translate(30, 25)">
        <rect x="0" y="0" width="100" height="22" rx="4" fill="#1e293b" stroke="#10b981"/>
        <text x="50" y="15" text-anchor="middle" class="box-text-sm" fill="#e2e8f0">Internal</text>
      </g>
      
      <g transform="translate(170, 25)">
        <rect x="0" y="0" width="100" height="22" rx="4" fill="#1e293b" stroke="#10b981"/>
        <text x="50" y="15" text-anchor="middle" class="box-text-sm" fill="#e2e8f0">External</text>
      </g>
    </g>
    
    <!-- Arrow marker -->
    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
        <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
      </marker>
    </defs>
  </svg>
</div>

<style>
.motivation-diagram {
  width: 100%;
  max-width: 420px;
  margin: 0 auto;
}

.diagram-svg {
  width: 100%;
  height: auto;
}

.layer-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.box-text {
  font-size: 11px;
  font-weight: 500;
}

.box-text-sm {
  font-size: 10px;
  font-weight: 500;
}

.arrow-label {
  font-size: 9px;
  font-style: italic;
}

.layer {
  transition: transform 0.3s ease, filter 0.3s ease;
}

.layer:hover {
  filter: brightness(1.1);
}
</style>
